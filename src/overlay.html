<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="pill" class="setup">
    <div id="setup-spinner"></div>
    <button id="cancel-btn" class="btn">
      <svg viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
    </button>
    <div id="waveform"></div>
    <button id="stop-btn" class="btn">
      <div class="stop-icon"></div>
    </button>
  </div>
  <script>
    const { listen, emit } = window.__TAURI__.event;
    const pill = document.getElementById('pill');

    const NUM_BARS = 10;
    const waveform = document.getElementById('waveform');

    // Create bars
    const bars = [];
    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar wave';

      // Center bulge: bars in middle are taller
      const distFromCenter = Math.abs(4.5 - i);
      const heightScale = Math.max(0, 1 - Math.pow(distFromCenter, 2) * (1 / 48));
      bar.style.setProperty('--bar-height-scale', heightScale);

      // Staggered animation: center starts first, ripples outward
      const delay = i < 5 ? 0.1 * i : 0.1 * (i - 10);
      bar.style.animationDelay = `${delay}s`;

      waveform.appendChild(bar);
      bars.push(bar);
    }

    document.getElementById('cancel-btn').addEventListener('click', () => {
      emit('cancel-recording');
    });

    document.getElementById('stop-btn').addEventListener('click', () => {
      emit('stop-recording');
    });

    listen('audio-levels', (event) => {
      const raw = event.payload;
      const avg = raw.reduce((a, b) => a + b, 0) / raw.length;
      const audioScale = Math.min(4, Math.max(1, 1 + avg * 12));
      bars.forEach((bar) => {
        bar.style.setProperty('--audio-scale', audioScale);
      });
    });

    listen('recording-state', (event) => {
      const state = event.payload;
      if (state === 'recording') {
        // Entrance animation
        pill.classList.remove('setup', 'dismiss');
        pill.classList.add('enter');
      }
      bars.forEach(bar => {
        bar.classList.toggle('active', state === 'recording');
        bar.classList.toggle('wave', state === 'recording');
        bar.classList.toggle('processing', state === 'processing');
      });
    });

    // Exit animation — shrink back down, then tell backend to hide window
    listen('pill-dismiss', () => {
      pill.classList.remove('enter');
      pill.classList.add('dismiss');
      setTimeout(() => {
        pill.classList.remove('dismiss');
        pill.classList.add('setup'); // Reset to compact state for next show
        emit('overlay-hidden');
      }, 120);
    });

    listen('model-download', (event) => {
      const state = event.payload;
      if (state === 'starting') {
        pill.classList.add('setup');
      } else if (state === 'ready' || state === 'error') {
        pill.classList.remove('setup');
      }
    });
  </script>
</body>
</html>
